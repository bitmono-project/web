version: 2
updates:
  # NuGet dependencies for .NET projects
  - package-ecosystem: "nuget"
    directory: "/"
    schedule:
      interval: "daily"
    labels:
      - "dependencies"
      - "nuget"
    reviewers:
      - "@me"
    assignees:
      - "sunnamed434"

  # GitHub Actions dependencies
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "github-actions"
    reviewers:
      - "@me"
    assignees:
      - "sunnamed434"

  # npm — add when a JS frontend (React/Astro) lands under the web project
  # - package-ecosystem: "npm"
  #   directory: "/BitMono.Web.Frontend"
  #   schedule:
  #     interval: "weekly"
